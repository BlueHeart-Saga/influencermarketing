name: Backend CI/CD (Docker)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4️⃣ Build & Push (WITH TAGS)
      - name: Build and Push Docker Image
        run: |
          docker build -t blueheartsaga/influencer-backend:latest ./backend
          docker build -t blueheartsaga/influencer-backend:${{ github.sha }} ./backend
          
          docker push blueheartsaga/influencer-backend:latest
          docker push blueheartsaga/influencer-backend:${{ github.sha }}

      # 5️⃣ Deploy to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: quickbox-backend-docker
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          images: blueheartsaga/influencer-backend:latest