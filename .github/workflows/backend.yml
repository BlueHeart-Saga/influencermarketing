name: Backend CI/CD (Docker)

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout
      - uses: actions/checkout@v4

      # 2️⃣ Login Docker
      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build Docker Image
      - name: Build Docker Image
        run: docker build -t blueheartsaga/influencer-backend:latest ./backend

      # 4️⃣ Push Docker Image
      - name: Push Docker Image
        run: docker push blueheartsaga/influencer-backend:latest

      # 5️⃣ 🚀 Deploy to Azure (FORCE refresh container)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: quickbox-backend-docker
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          images: blueheartsaga/influencer-backend:latest